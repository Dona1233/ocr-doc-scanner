<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OCR Document Scanner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

  <h1 class="mb-4">OCR Document Scanner</h1>

  <form method="POST" action="/upload" enctype="multipart/form-data">
    <input type="file" name="file" accept=".jpg,.jpeg,.png,.pdf" class="form-control mb-3" required>
    <button type="submit" class="btn btn-primary">Extract Text</button>
  </form>

  {% if extracted_text %}
  <h3 class="mt-5">Extracted Text</h3>
  <textarea
      class="form-control"
      rows="15"
      readonly>{{ extracted_text }}</textarea>

  <a href="/download" class="btn btn-success mt-3">Download as .txt</a>
  {% endif %}

</body>
</html>
